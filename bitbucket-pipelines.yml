image: python:3.9

definitions:
  steps:
    - step: &setup-environment
        name: Setup Environment
        caches:
          - pip
        script:
          - pip install -r requirements.txt
          - echo "Environment setup complete"

    - step: &run-gam-script
        name: Run GAM Geo Fetch Script
        caches:
          - pip
        script:
          - python geofetchgsheet.py
        artifacts:
          - logs/**

pipelines:
  default:
    - step: *setup-environment
    - step: *run-gam-script

  branches:
    main:
      - step: *setup-environment
      - step: *run-gam-script

  pull-requests:
    '**':
      - step: *setup-environment
      - step: *run-gam-script 