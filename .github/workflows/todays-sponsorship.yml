name: Today's Sponsorship Details

on:
  # Allow manual trigger
  workflow_dispatch:

  # Schedule: Daily at 00:04 IST and every 4 hours
  # IST is UTC+5:30, so times in UTC:
  # 00:04 IST = 18:34 UTC (previous day)
  # 04:04 IST = 22:34 UTC (previous day)
  # 08:04 IST = 02:34 UTC
  # 12:04 IST = 06:34 UTC
  # 16:04 IST = 10:34 UTC
  # 20:04 IST = 14:34 UTC
  schedule:
    - cron: '34 18 * * *'   # 00:04 IST
    - cron: '34 22 * * *'   # 04:04 IST
    - cron: '34 2 * * *'    # 08:04 IST
    - cron: '34 6 * * *'    # 12:04 IST
    - cron: '34 10 * * *'   # 16:04 IST
    - cron: '34 14 * * *'   # 20:04 IST

jobs:
  run-sponsorship-details:
    name: Fetch Today's Sponsorship Details
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          echo "Dependencies installed successfully"

      - name: Generate YAML configuration files
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python generate_yaml.py

      - name: Run Today's Sponsorship Details
        env:
          GAM_YAML_FILE: googleadsN.yaml
        run: |
          mkdir -p output
          python TodaySponsorshipDetails.py --cli --json-output output/sponsorship_details.json
          echo "JSON output saved to output/sponsorship_details.json"

      - name: Upload Sponsorship Details JSON
        uses: actions/upload-artifact@v4
        with:
          name: sponsorship-details-${{ github.run_number }}
          path: output/sponsorship_details.json
          retention-days: 30

      - name: Send Email with Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Today's Sponsorship Details - ${{ github.run_number }}"
          to: subhashish.singh@timesinternet.in
          from: ${{ secrets.SMTP_FROM_EMAIL }}
          body: |
            Hi,

            Please find attached the Today's Sponsorship Details report.

            Generated at: ${{ github.event.repository.updated_at }}
            Run Number: ${{ github.run_number }}
            
            This is an automated email from GitHub Actions.
            
            Regards,
            GAM Automation
          attachments: output/sponsorship_details.json
